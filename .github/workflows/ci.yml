name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || secrets.Testudoq_token }}
    steps:
      - uses: actions/checkout@v4

      - name: Block synthetic injection in CI
        run: |
          if [ -n "${ALLOW_SYNTHETIC_INJECTION:-}" ]; then
            echo "ERROR: ALLOW_SYNTHETIC_INJECTION must not be set in CI" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests (Vitest)
        run: npm test
      - name: Install Playwright browsers and dependencies
        run: npx playwright install --with-deps
      - name: Run E2E tests (Playwright)
        run: npm run test:e2e
      - name: Build bundle
        run: npm run build
        env:
          CI: true

      - name: SonarCloud Scan (conditional)
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        with:
          projectBaseDir: .
          args: >-
            -Dsonar.organization=testudoq-org -Dsonar.projectKey=testudoq-org_zxspeccjs
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  parsed-snapshot-parity:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Regenerate parsed Jetpac snapshot
        run: node tests/scripts/regenerate_parsed_jetpac.mjs
      - name: Check parsed snapshot parity
        run: git --no-pager diff --exit-code -- traces/parsed_jetpac_snapshot.json
